<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="gxVZ--q4ZYwoNQz58v_qnGphpc25kzwcDIRUngoG6xo" />

    <title>PrepTrack | Daily UPSC PYQ Challenge</title>
    <meta name="description" content="Master UPSC Prelims with daily 10-question drills, consistency heatmaps, and real-time performance analytics.">
    <meta name="keywords" content="UPSC Prelims 2026, IAS Exam Prep, UPSC PYQ Quiz, GS Practice, Amruta PrepTrack">
    
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="dashboard-body">

    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">PrepTrack <span class="badge-amruta">w/ Amruta</span></div>
            <div class="nav-right">
                <div class="streak-pill">🔥 <span id="streak-count">0</span> Days</div>
                <div id="auth-area">
                    <button class="btn-signin" onclick="handleLogin()">Sign In</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="filter-bar">
        <div class="filter-container">
            <button class="filter-btn active" onclick="startFilteredQuiz('All')">All Subjects</button>
            <button class="filter-btn" onclick="startFilteredQuiz('History')">History</button>
            <button class="filter-btn" onclick="startFilteredQuiz('Polity')">Polity</button>
            <button class="filter-btn" onclick="startFilteredQuiz('Geography')">Geography</button>
            <button class="filter-btn" onclick="startFilteredQuiz('Economy')">Economy</button>
            <button class="filter-btn" onclick="startFilteredQuiz('Science')">Science</button>
            <button class="filter-btn review-btn" onclick="startFilteredQuiz('Review')">
                <i class="fas fa-redo"></i> Review Errors
            </button>
        </div>
    </div>

    <main class="dashboard-main">
        <aside class="sidebar-left">
            <div class="card stats-card mastery-theme">
                <h3><i class="fas fa-rocket"></i> Mastery Level</h3>
                <div class="stats-grid">
                    <div class="stat-box">
                        <span id="points-val">0</span>
                        <label>XP Earned</label>
                    </div>
                    <div class="stat-box">
                        <span id="solved-count">0</span>
                        <label>Total Solved</label>
                    </div>
                </div>
                
                <div class="progress-container" style="margin-top: 25px;">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <p id="quest-progress-text" style="font-size: 0.75rem; font-weight: 700; color: #cbd5e1;">Quest Progress</p>
                        <span class="goal-tag">250 Goal</span>
                    </div>
                    <div class="progress-bar-bg">
                        <div id="progress-bar-fill" class="progress-fill"></div>
                    </div>
                </div>
            </div>

            <div class="card leaderboard-card">
                <h3><i class="fas fa-crown"></i> Global Rankings</h3>
                <div id="leaderboard-list">
                    <p class="loading">Syncing rankings...</p>
                </div>
            </div>
        </aside>

        <section class="quiz-workspace">
            <div class="card heatmap-card">
                <div class="heatmap-header">
                    <h3 style="margin: 0;"><i class="fas fa-calendar-check"></i> Consistency</h3>
                    <span id="month-label" class="current-month"></span>
                </div>
                <div class="calendar-grid-labels">
                    <div>S</div><div>M</div><div>T</div><div>W</div><div>T</div><div>F</div><div>S</div>
                </div>
                <div id="calendar-days" class="heatmap-container"></div>
            </div>

            <div id="quiz-section" class="card main-quiz-card">
                <div id="quiz-container">
                    <div class="welcome-screen">
                        <div class="hero-icon">🏛️</div>
                        <h1>Daily UPSC Mission</h1>
                        <p>Sharpen your accuracy with today's 10-question high-yield drill.</p>
                        <button class="btn-primary-large pulse-btn" onclick="startFilteredQuiz('All')">
                            Begin Today's Drill
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <aside class="sidebar-right">
            <div class="card todo-card">
                <h3><i class="fas fa-tasks"></i> Daily Targets</h3>
                <div class="todo-input-group">
                    <input type="text" id="todo-input" placeholder="Laxmikanth Ch 1...">
                    <button onclick="addTask()"><i class="fas fa-plus"></i></button>
                </div>
                <ul id="todo-list" class="todo-list-container"></ul>
            </div>

            <div class="card viral-card">
                <h3><i class="fas fa-users"></i> Aspirant Network</h3>
                <div class="community-links">
                    <a href="https://chat.whatsapp.com/LihUVh54RPABbC3DvbUGzS" target="_blank" class="community-btn whatsapp">
                        <i class="fab fa-whatsapp"></i> WhatsApp
                    </a>
                    <a href="https://t.me/+lPHy-5mn4iw3NGI1" target="_blank" class="community-btn telegram">
                        <i class="fab fa-telegram-plane"></i> Telegram
                    </a>
                    <a href="https://www.youtube.com/@PrepTrackwithAmruta" target="_blank" class="community-btn youtube">
                        <i class="fab fa-youtube"></i> YouTube
                    </a>
                </div>
            </div>
        </aside>
    </main>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    
    <script src="script.js"></script>
</body>
</html>
